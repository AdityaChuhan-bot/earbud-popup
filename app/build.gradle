plugins {
    id 'com.android.application'
}

android {
    namespace "com.aditya.earbudpopup"
    compileSdk 33

    defaultConfig {
        applicationId "com.aditya.earbudpopup"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
        }
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.google.android.material:material:1.9.0'
}
